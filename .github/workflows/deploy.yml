name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build site
        run: npm run build

      # The site keeps `site: centrobiodent.net` (final domain, served at root).
      # Inside the v2 pages, markdown cross-links point to v1 routes
      # (/trattamenti/…, /tecnologie/…, /casi/…). Localize them to /v2/ so the
      # v2 demo stays self-contained. Must run before the base-prefix step below.
      - name: Localize internal cross-links inside v2
        run: |
          find dist/v2 -name '*.html' -exec \
            sed -i -E 's#href="/(trattamenti|tecnologie|casi)/#href="/v2/\1/#g' {} +

      # GitHub Pages serves this project repo under /biodent-astro/, so we rewrite
      # root-relative links/assets in the built HTML to that base path. This keeps
      # the source untouched: only the temporary Pages build is adjusted.
      - name: Rewrite paths for /biodent-astro/ base
        run: |
          find dist -name '*.html' -exec \
            sed -i -E 's#(href|src)="/([^/])#\1="/biodent-astro/\2#g' {} +

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
